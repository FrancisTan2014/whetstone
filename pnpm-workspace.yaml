packages:
  - src/apps/*
  - src/packages/*
# esbuild ships a prebuilt platform binary as an optional dependency; approving
# its (otherwise harmless) postinstall keeps pnpm install from failing on an
# unapproved build script under pnpm 11. CI installs with --frozen-lockfile.
allowBuilds:
  esbuild: true
  wordpos: true
